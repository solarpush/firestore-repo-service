name: Publish to npm

on:
    push:
        branches:
            - master
            - main
        tags:
            - "v*" # Triggered on tags like v1.0.0, v2.0.1, etc.

jobs:
    test:
        runs-on: ubuntu-latest
        # Only run on tag push, not on regular branch push
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Setup Java (for Firebase Emulator)
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Install Firebase CLI
              run: npm install -g firebase-tools

            - name: Run tests with emulator
              run: |
                  firebase emulators:exec --only firestore --project demo-no-project "bun test test/repo.test.ts"

    publish:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Update package.json version
              run: |
                  npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

            - name: Publish to npm
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
